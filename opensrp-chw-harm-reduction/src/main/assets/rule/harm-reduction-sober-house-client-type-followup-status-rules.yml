name: step1_discontinued_reason
description: Show discontinued_reason when its condition is met
priority: 1
condition: "step1_service_continuation_status == 'discontinued_service'"
actions:
  - "isRelevant = true"
---
name: step1_discontinued_other_reason
description: Show discontinued_other_reason when discontinued_reason is other
priority: 1
condition: "step1_service_continuation_status == 'discontinued_service' && step1_discontinued_reason == 'other'"
actions:
  - "isRelevant = true"
---
name: step1_cause_of_death
description: Show cause_of_death when discontinued_reason is client_deceased
priority: 1
condition: "step1_service_continuation_status == 'discontinued_service' && step1_discontinued_reason == 'client_deceased'"
actions:
  - "isRelevant = true"
---
name: step1_cause_of_death_other_specify
description: Show cause_of_death_other_specify when cause_of_death is other
priority: 1
condition: "step1_service_continuation_status == 'discontinued_service' && step1_discontinued_reason == 'client_deceased' && step1_cause_of_death == 'other'"
actions:
  - "isRelevant = true"
---
name: step1_follow_up_status
description: Calculate follow_up_status from the continuation choice and discontinued reason
priority: 1
condition: "true"
actions:
  - "calculation = (step1_service_continuation_status == 'continuing_service' ? 'continuing_service' : step1_discontinued_reason)"
