---
name: step1_service_continuation_status
description: Show service_continuation_status when its condition is met
priority: 1
condition: "step1_client_type == 'returning_client'"
actions:
  - "isRelevant = true"
---
name: step1_discontinued_reason
description: Show discontinued_reason when its condition is met
priority: 1
condition: "step1_client_type == 'returning_client' && step1_service_continuation_status == 'discontinued_service'"
actions:
  - "isRelevant = true"
---
name: step1_follow_up_status
description: Calculate follow_up_status from the continuation choice and discontinued reason
priority: 1
condition: "true"
actions:
  - "calculation = (step1_service_continuation_status == 'continuing_service' ? 'continuing_service' : step1_discontinued_reason)"
